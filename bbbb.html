<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTZ Engineering College</title>
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      color: #000;
      text-align: center;
    }

    /* Header */
    header {
      background-color: #fffb00;
      padding: 20px 0;
    }

    header h1 {
      font-size: 40px;
      letter-spacing: 1px;
    }

    /* Navigation */
    nav {
      background-color: #fff;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav ul li {
      margin: 10px 20px;
    }

    nav a {
      text-decoration: none;
      font-size: 18px;
      color: #000;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #007bff;
    }

    /* Main Image */
    .main-image img {
      width: 90%;
      max-width: 1200px;
      height: auto;
      margin: 30px auto;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    /* Iframes Section */
    .iframe-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin: 40px 0;
    }

    iframe {
      border: 2px solid #ddd;
      border-radius: 10px;
    }

    /* Buttons */
    .btn-group {
      margin: 30px 0;
    }

    .btn-group a {
      text-decoration: none;
      background-color: #007bff;
      color: #fff;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 6px;
      display: inline-block;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }

    .btn-group a:hover {
      background-color: #0056b3;
    }

    /* Responsive */
    @media (max-width: 768px) {
      header h1 {
        font-size: 28px;
      }

      nav ul li {
        margin: 8px 10px;
      }

      .iframe-section iframe {
        width: 90%;
        height: 300px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>RTZ ENGINEERING COLLEGE</h1>
  </header>

  <!-- Navigation -->
  <nav>
    <ul>
      <li><a href="about.html">About Us</a></li>
      <li><a href="year.html">Year</a></li>
      <li><a href="faculty.html">Faculty</a></li>
      <li><a href="photos.html">Photos</a></li>
      <li><a href="event.html">Events</a></li>
      <li><a href="loginid.html">Login ID</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>

  <!-- Main Image -->
  <section class="main-image">
    <img src="instHeaderDesktop.jpg" alt="RTZ College Image" />
  </section>

  <!-- Iframes Section -->
  <section class="iframe-section">
    <iframe src="gettyimages-2152031932-640x640.jpg" width="500" height="400"></iframe>
    <iframe src="text.html" width="700" height="400"></iframe>
    <iframe src="text.html" width="700" height="400"></iframe>
    <iframe src="gettyimages-2152031932-640x640.jpg" width="500" height="400"></iframe>
  </section>

  <!-- Buttons -->
  <div class="btn-group">
    <a href="#">Login</a>
    <a href="#">Register</a>
    <a href="#">Know More</a>
    <a href="#">Contact</a>
  </div>

</body>
</html>
